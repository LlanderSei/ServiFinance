name: Security checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore src/backend/ServiFinance.Api/ServiFinance.Api.csproj

      - name: Audit .NET dependencies
        run: dotnet list src/backend/ServiFinance.Api/ServiFinance.Api.csproj package --vulnerable --include-transitive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/frontend/ServiFinance.Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend/ServiFinance.Frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: src/frontend/ServiFinance.Frontend
        run: npm run audit

      - name: Lint frontend security/static rules
        working-directory: src/frontend/ServiFinance.Frontend
        run: npm run lint
